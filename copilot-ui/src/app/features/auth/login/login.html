<!-- login.html -->
<div class="login-page">
  <!-- floating orbs / animated blobs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  
  <!-- animated grid overlay -->
  <div class="grid-overlay"></div>
  
  <!-- glassmorphism login card -->
  <div class="login-card">
    <!-- decorative top accent -->
    <div class="card-accent"></div>
    
    <!-- header with animated icon -->
    <div class="header-icon">
      <i class="fas fa-robot"></i>
    </div>
    
    <h1 class="title">Welcome Back</h1>
    <p class="subtitle">Login to your AI Copilot</p>

    <!-- pure HTML form - no Angular bindings -->
    <form class="login-form">
      <!-- email input with floating label effect -->
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          name="email"
          placeholder="Enter your email" 
          class="floating-input">
        <div class="input-highlight"></div>
        <i class="fas fa-envelope input-icon"></i>
      </div>

      <!-- password input with strength indicator -->
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          class="floating-input">
        <div class="input-highlight"></div>
        <i class="fas fa-lock input-icon"></i>
        <!-- password visibility toggle (pure HTML, icon only) -->
        <button type="button" class="password-toggle" tabindex="-1">
          <i class="fas fa-eye"></i>
        </button>
        <!-- visual strength meter (static for design) -->
        <div class="strength-meter">
          <div class="strength-bar" style="width: 60%;"></div>
        </div>
      </div>

      <!-- remember me & forgot password row -->
      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox" name="rememberMe">
          <span class="checkmark"></span>
          <span class="remember-text">Remember me</span>
        </label>
        <a routerLink="/auth/forgot-password" class="forgot-link">Forgot Password?</a>
      </div>

      <!-- animated login button -->
      <button type="submit" class="login-btn">
        <span class="btn-text">Login</span>
        <span class="btn-icon">
          <i class="fas fa-arrow-right"></i>
        </span>
        <div class="btn-shine"></div>
      </button>

      <!-- divider with AI effect -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">
          <i class="fas fa-microchip"></i> secure access <i class="fas fa-microchip"></i>
        </span>
        <span class="divider-line"></span>
      </div>

      <!-- signup link with micro-interaction -->
      <p class="signup-link">
        Don't have an account?
        <a routerLink="/auth/register" class="register-link">
          Register
          <i class="fas fa-sparkles"></i>
        </a>
      </p>
    </form>
  </div>
</div>
