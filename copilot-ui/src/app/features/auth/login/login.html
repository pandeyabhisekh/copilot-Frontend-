<div class="login-page">
  <!-- Animated background elements -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="grid-overlay"></div>
  
  <!-- Login Card -->
  <div class="login-card">
    <div class="card-accent"></div>
    
    <div class="header-icon">
      <i class="fas fa-robot"></i>
    </div>
    
    <h1 class="title">Welcome Back</h1>
    <p class="subtitle">Sign in to continue</p>

    <!-- Success/Error Messages -->
    <div *ngIf="successMessage" class="alert alert-success">
      <i class="fas fa-check-circle"></i> {{ successMessage }}
    </div>
    
    <div *ngIf="errorMessage" class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <!-- Email/Password Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          formControlName="email"
          placeholder="Enter your email" 
          class="floating-input"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
        <div class="input-highlight"></div>
        <i class="fas fa-envelope input-icon"></i>
        <div class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Valid email required
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          class="floating-input"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
        <div class="input-highlight"></div>
        <i class="fas fa-lock input-icon"></i>
        <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
          <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
        </button>
        <div class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password required
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox" formControlName="rememberMe">
          <span class="checkmark"></span>
          <span class="remember-text">Remember me</span>
        </label>
        <a routerLink="/auth/forgot-password" class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn" [disabled]="loading">
        <span class="btn-text">{{ loading ? 'Signing in...' : 'Sign In' }}</span>
        <span class="btn-icon" *ngIf="!loading">
          <i class="fas fa-arrow-right"></i>
        </span>
        <span class="btn-icon" *ngIf="loading">
          <i class="fas fa-spinner fa-spin"></i>
        </span>
        <div class="btn-shine"></div>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-text">OR</span>
      <span class="divider-line"></span>
    </div>

    <!-- GitHub Login Button -->
    <button class="github-btn" (click)="onGitHubLogin()" [disabled]="githubLoading">
      <i class="fab fa-github"></i>
      <span>{{ githubLoading ? 'Redirecting...' : 'Continue with GitHub' }}</span>
    </button>

    <!-- Test User Helper (Optional - remove in production) -->
    <div class="test-user-helper" *ngIf="!successMessage" (click)="fillTestUser()">
      <i class="fas fa-flask"></i> Use test account
    </div>

    <!-- Register Link -->
    <p class="signup-link">
      Don't have an account?
      <a routerLink="/auth/register" class="register-link">
        Create account
        <i class="fas fa-arrow-right"></i>
      </a>
    </p>
  </div>
</div>
